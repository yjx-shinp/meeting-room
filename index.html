<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全景机构部 - 5楼会议室预约系统</title>

<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-database-compat.js"></script>

<style>
  :root {
    --primary: #1a6dcc;
    --primary-light: #e8f2fb;
    --primary-dark: #1456a3;
    --morning: #f0a04b;
    --morning-light: #fef7f0;
    --morning-border: #f5c98e;
    --afternoon: #5b9bd5;
    --afternoon-light: #f0f6fc;
    --afternoon-border: #9dc3e6;
    --success: #27ae60;
    --danger: #e74c3c;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --border: #e0e5ec;
    --bg: #f5f7fa;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  /* ========== 头部 ========== */
  .header {
    background: linear-gradient(135deg, #1a3a5c 0%, #1a6dcc 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  /* ========== 密码锁屏 ========== */
  .lock-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #f5f7fa;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lock-overlay.hidden { display: none; }
  .lock-card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 32px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
  }
  .lock-card .lock-icon { font-size: 48px; margin-bottom: 16px; }
  .lock-card h2 { font-size: 20px; margin-bottom: 6px; color: var(--text); }
  .lock-card .lock-sub { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }
  .lock-card input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    text-align: center;
    font-family: inherit;
    letter-spacing: 4px;
    transition: border-color 0.2s;
  }
  .lock-card input:focus { outline: none; border-color: var(--primary); }
  .lock-card .lock-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 20px; }
  .lock-card .lock-hint { color: var(--text-light); font-size: 11px; margin-top: 16px; }

  /* ========== 连接状态 ========== */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 12px;
    padding: 6px;
    border-radius: 20px;
    transition: all 0.3s;
  }
  .status-bar.online { background: #e8f8e8; color: #27ae60; }
  .status-bar.offline { background: #fff5f5; color: #e74c3c; }
  .status-bar.connecting { background: #fffdf5; color: #f0a04b; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.online { background: #27ae60; animation: pulse 2s infinite; }
  .status-dot.offline { background: #e74c3c; }
  .status-dot.connecting { background: #f0a04b; animation: pulse 0.6s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ========== 工具栏 ========== */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--white);
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .month-nav button:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .month-label { font-size: 17px; font-weight: 700; min-width: 130px; text-align: center; color: var(--text); }
  .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-today, .btn-settings {
    padding: 7px 16px;
    border: 1px solid var(--primary);
    border-radius: var(--radius-sm);
    background: var(--white);
    color: var(--primary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-today:hover, .btn-settings:hover { background: var(--primary); color: #fff; }
  .btn-clear {
    padding: 7px 16px;
    border: 1px solid var(--danger);
    border-radius: var(--radius-sm);
    background: var(--white);
    color: var(--danger);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-clear:hover { background: var(--danger); color: #fff; }
  .stats {
    font-size: 13px;
    color: var(--text-light);
    background: var(--bg);
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .stats strong { color: var(--primary); }

  /* ========== 图例 ========== */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text-light);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-dot.morning { background: var(--morning-light); border: 1.5px solid var(--morning-border); }
  .legend-dot.afternoon { background: var(--afternoon-light); border: 1.5px solid var(--afternoon-border); }
  .legend-dot.booked { background: #e8f8e8; border: 1.5px solid #a3d9a5; }

  /* ========== 遮罩 ========== */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.85);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .loading-overlay.hidden { display: none; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-light); }

  /* ========== 日历 ========== */
  .calendar-wrap {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f0f4f8;
    border-bottom: 1px solid var(--border);
  }
  .weekdays div {
    padding: 12px 4px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
  }
  .weekdays div:first-child, .weekdays div:last-child { color: var(--danger); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; }
  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: background 0.15s;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month { background: #fafbfc; }
  .day-cell.other-month .date-num { color: #c0c7cf; }
  .day-cell.today { background: #fffdf5; }
  .day-cell.today .date-num {
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .date-num { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1px; }
  .day-cell:nth-child(7n) .date-num, .day-cell:nth-child(7n-6) .date-num { color: var(--danger); }

  .slot {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 6px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    cursor: pointer;
    border: 1.5px dashed transparent;
    transition: all 0.2s;
    position: relative;
    min-height: 24px;
  }
  .slot.outside-month { opacity: 0.4; pointer-events: none; }
  .slot.available:hover { transform: translateY(-1px); }
  .slot-label {
    font-weight: 700;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .slot.morning { background: var(--morning-light); border-color: var(--morning-border); }
  .slot.morning .slot-label { background: var(--morning); color: #fff; }
  .slot.afternoon { background: var(--afternoon-light); border-color: var(--afternoon-border); }
  .slot.afternoon .slot-label { background: var(--afternoon); color: #fff; }
  .slot.booked { background: #e8f8e8; border-color: #a3d9a5; cursor: pointer; }
  .slot.booked:hover { background: #d4f2d4; }
  .slot-info { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: var(--text); }
  .slot-info strong { font-size: 11px; }
  .slot .badge-people {
    font-size: 10px;
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 10px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .slot .btn-delete {
    display: none;
    width: 16px; height: 16px;
    border: none;
    background: var(--danger);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 10px;
    line-height: 1;
    flex-shrink: 0;
    text-align: center;
  }
  .slot.booked:hover .btn-delete { display: inline-flex; align-items: center; justify-content: center; }
  .slot.booked:hover .badge-people { display: none; }
  .slot.available .slot-info { color: #aab5c0; font-size: 10px; }

  /* ========== 弹窗 ========== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s;
  }
  .modal h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .modal .modal-date {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal .modal-date .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }
  .modal .modal-date .tag.morning { background: var(--morning); }
  .modal .modal-date .tag.afternoon { background: var(--afternoon); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .form-group label .required { color: var(--danger); margin-left: 2px; }
  .form-group label .optional { color: var(--text-light); font-weight: 400; font-size: 11px; margin-left: 4px; }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
    background: var(--bg);
    color: var(--text);
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,109,204,0.1);
  }
  .form-group input.error { border-color: var(--danger); background: #fff5f5; }
  .form-group .error-msg { font-size: 11px; color: var(--danger); margin-top: 2px; display: none; }
  .form-group .error-msg.show { display: block; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-divider {
    font-size: 12px;
    color: var(--text-light);
    margin: 14px 0 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-weight: 600;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn {
    padding: 9px 22px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #e8ecf0; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-saving { background: #95a5a6; color: #fff; cursor: not-allowed; opacity: 0.7; }

  /* ========== 详情弹窗 ========== */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin: 12px 0; }
  .detail-item { font-size: 13px; }
  .detail-item .detail-label { color: var(--text-light); font-size: 11px; }
  .detail-item .detail-value { color: var(--text); font-weight: 500; }
  .detail-item .detail-value.empty { color: #ccc; font-style: italic; }
  .detail-item.full-width { grid-column: 1 / -1; }

  /* ========== Toast ========== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.3s;
    pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .toast.success { background: #27ae60; color: #fff; }
  .toast.error { background: #e74c3c; color: #fff; }
  .toast.info { background: #1a6dcc; color: #fff; }

  /* ========== 响应式：平板 ========== */
  @media (max-width: 768px) {
    body { padding: 6px; }
    .header { padding: 12px 14px; border-radius: 8px; margin-bottom: 8px; }
    .header h1 { font-size: 16px; letter-spacing: 0; }
    .header .subtitle { font-size: 11px; }

    .toolbar { padding: 8px 10px; gap: 6px; border-radius: 8px; margin-bottom: 8px; }
    .month-nav button { width: 32px; height: 32px; font-size: 14px; }
    .month-label { font-size: 14px; min-width: 100px; }
    .stats { font-size: 11px; padding: 4px 8px; }
    .btn-today, .btn-settings, .btn-clear { padding: 5px 10px; font-size: 11px; }

    .legend { gap: 10px; font-size: 11px; margin-bottom: 8px; }

    .weekdays div { padding: 8px 2px; font-size: 11px; }
    .calendar-grid { grid-auto-rows: auto; }
    .day-cell { min-height: 60px; padding: 3px; gap: 2px; }
    .date-num { font-size: 10px; }

    .slot { padding: 2px 3px; border-radius: 4px; min-height: 20px; }
    .slot-label { font-size: 8px; padding: 1px 3px; }
    .slot-info { font-size: 9px; }
    .slot-info strong { font-size: 9px; }
    .slot .badge-people { font-size: 8px; padding: 1px 3px; }
    .slot .btn-delete { width: 14px; height: 14px; font-size: 8px; }

    .modal { width: 96%; padding: 14px; max-width: none; border-radius: 12px 12px 0 0; max-height: 90vh; }
    .form-group { margin-bottom: 10px; }
    .form-group label { font-size: 12px; }
    .form-group input { padding: 10px; font-size: 16px; } /* 16px 防止iOS自动缩放 */
    .form-row { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }

    .btn { padding: 10px 16px; font-size: 13px; }

    .lock-card { padding: 30px 20px; }
    .lock-card h2 { font-size: 17px; }
    .lock-card input { padding: 14px 16px; font-size: 18px; }
  }

  /* ========== 响应式：小手机 ========== */
  @media (max-width: 420px) {
    body { padding: 2px; }
    .header { padding: 10px 12px; border-radius: 0; margin-bottom: 4px; }
    .header h1 { font-size: 14px; }
    .header .subtitle { font-size: 10px; }

    .toolbar { padding: 6px 8px; gap: 4px; border-radius: 0; margin-bottom: 4px; }
    .month-label { font-size: 13px; min-width: 90px; }

    .legend { display: none; } /* 手机端隐藏图例，节省空间 */

    .status-bar { font-size: 10px; padding: 4px; margin-bottom: 4px; }

    .weekdays div { padding: 6px 1px; font-size: 10px; }
    .day-cell { min-height: 48px; padding: 1px; gap: 1px; }
    .date-num { font-size: 9px; }

    .slot { padding: 1px 2px; min-height: 18px; }
    .slot-label { font-size: 7px; }
    .slot-info { display: none; }
    .slot.booked .slot-info { display: block; font-size: 8px; }
    .slot.booked .slot-info strong { font-size: 8px; }
    .slot .badge-people { display: none; }

    .stats { display: none; }
    .btn-today, .btn-settings, .btn-clear { padding: 4px 7px; font-size: 10px; }

    .modal { width: 100%; padding: 12px; border-radius: 12px 12px 0 0; max-height: 92vh; }
    .modal h3 { font-size: 15px; }
    .form-group input { padding: 10px; font-size: 16px; }
    .modal-actions { gap: 6px; }
    .modal-actions .btn { flex: 1; text-align: center; }

    .lock-card { width: 95%; padding: 24px 16px; }
    .lock-card .lock-icon { font-size: 36px; }
    .lock-card h2 { font-size: 16px; }
    .lock-card input { padding: 12px; font-size: 16px; }
  }

  /* ========== iOS 安全区域 ========== */
  @supports (padding-top: env(safe-area-inset-top)) {
    body { padding-top: calc(6px + env(safe-area-inset-top)); padding-bottom: calc(6px + env(safe-area-inset-bottom)); }
    @media (max-width: 420px) { body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); } }
  }

  @media print {
    body { background: #fff; }
    .toolbar, .btn-delete, .legend, .status-bar, .lock-overlay { display: none; }
    .calendar-wrap { box-shadow: none; border: 1px solid #000; }
    .slot.booked { background: #fff; border: 1px solid #000; }
    .modal-overlay { display: none !important; }
  }
</style>
</head>
<body>

<!-- ========== 🔐 密码锁屏 ========== -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <h2>全景机构部 · 5楼会议室</h2>
    <div class="lock-sub">请输入访问密码</div>
    <input type="password" id="lockPassword" placeholder="请输入密码" maxlength="20" autocomplete="off">
    <div class="lock-error" id="lockError"></div>
    <div class="lock-hint">仅供内部使用</div>
  </div>
</div>

<!-- ========== 主界面（通过密码后显示） ========== -->
<div id="mainApp" style="display:none;">

<div class="header">
  <h1>🏢 全景机构部 · 5楼会议室预约</h1>
  <div class="subtitle" id="headerSub">多人共享 · 实时同步</div>
</div>

<div class="status-bar connecting" id="statusBar">
  <span class="status-dot connecting" id="statusDot"></span>
  <span id="statusText">正在连接数据库…</span>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载预约数据…</div>
</div>

<div class="toolbar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)" title="上一月">◀</button>
    <span class="month-label" id="monthLabel">2026年 7月</span>
    <button onclick="changeMonth(1)" title="下一月">▶</button>
  </div>
  <div class="toolbar-right">
    <span class="stats" id="stats">本月预约：<strong>0</strong> 场</span>
    <button class="btn-today" onclick="goToday()">📅 回到今天</button>
    <button class="btn-settings" onclick="openSettings()">⚙️ 设置</button>

<!-- ========== 脚本 ========== -->
<script>
// ==================== Firebase 配置 ====================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD4mppZuyIT2uQtcyNRR-D5gE8dTi25RcA",
  authDomain: "quanjing1.firebaseapp.com",
  databaseURL: "https://quanjing1-default-rtdb.firebaseio.com",
  projectId: "quanjing1",
  storageBucket: "quanjing1.firebasestorage.app",
  messagingSenderId: "69493493817",
  appId: "1:69493493817:web:062c58e363406caad9bde8"
};

// ==================== 全局变量 ====================
let db = null;
let dbReady = false;
let bookingsCache = {};
let settingsCache = {
  password: 'quanjing888',
  title: '全景机构部 · 5楼会议室预约',
  amLabel: '上午 9:00-12:00',
  pmLabel: '下午 14:00-17:00'
};

let currentYear, currentMonth;
let detailKey = null;

// ==================== 🔐 密码验证 ====================
function checkLogin() {
  // 如果 sessionStorage 里有登录标记，跳过密码验证
  if (sessionStorage.getItem('meeting_logged_in') === 'true') {
    document.getElementById('lockOverlay').classList.add('hidden');
    document.getElementById('mainApp').style.display = '';
    return true;
  }
  return false;
}

function doLogin() {
  const input = document.getElementById('lockPassword').value.trim();
  const errorEl = document.getElementById('lockError');

  if (!input) { errorEl.textContent = '请输入密码'; return; }
  if (input !== settingsCache.password) {
    errorEl.textContent = '❌ 密码错误，请重试';
    document.getElementById('lockPassword').value = '';
    return;
  }

  errorEl.textContent = '';
  sessionStorage.setItem('meeting_logged_in', 'true');
  document.getElementById('lockOverlay').classList.add('hidden');
  document.getElementById('mainApp').style.display = '';

  // 登录成功后初始化 Firebase 和日历
  if (!db) { initFirebase(); }
  if (Object.keys(bookingsCache).length > 0) { renderCalendar(); }
}

// 回车键登录
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('lockPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});

// ==================== 默认设置初始化（Firebase 连接后检查并写入） ====================
function initDefaultSettings() {
  firebase.database().ref('settings').once('value', function(snap) {
    if (snap.val()) {
      settingsCache = snap.val();
      // 应用设置
      applySettings();
    } else {
      // 第一次使用，写入默认设置
      firebase.database().ref('settings').set(settingsCache);
      applySettings();
    }
  });
}

function applySettings() {
  document.querySelector('.header h1').textContent = '🏢 ' + settingsCache.title;
  document.getElementById('headerSub').textContent = '多人共享 · 实时同步';
  // 更新图例
  const legendItems = document.querySelectorAll('.legend-item');
  if (legendItems[0]) legendItems[0].childNodes[1] && (legendItems[0].lastChild.textContent = settingsCache.amLabel);
  if (legendItems[1]) legendItems[1].childNodes[1] && (legendItems[1].lastChild.textContent = settingsCache.pmLabel);
}

// ==================== 🔥 Firebase 初始化 ====================
function initFirebase() {
  try {
    if (FIREBASE_CONFIG.apiKey.includes('PLACEHOLDER')) {
      showStatus('offline', '❌ 未配置 Firebase');
      document.getElementById('loadingOverlay').classList.add('hidden');
      return;
    }

    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();

    // 连接状态
    firebase.database().ref('.info/connected').on('value', function(snap) {
      if (snap.val() === true) {
        dbReady = true;
        showStatus('online', '✅ 已连接 · 多人实时同步中');
        document.getElementById('loadingOverlay').classList.add('hidden');
      } else {
        dbReady = false;
        showStatus('offline', '⚠️ 连接断开，正在重连…');
      }
    });

    // 初始化设置
    initDefaultSettings();

    // 监听预约数据
    firebase.database().ref('bookings').on('value', function(snapshot) {
      bookingsCache = snapshot.val() || {};
      document.getElementById('loadingOverlay').classList.add('hidden');
      renderCalendar();
    }, function(err) {
      showToast('⚠️ 数据读取失败', 'error');
      document.getElementById('loadingOverlay').classList.add('hidden');
    });

  } catch (e) {
    showStatus('offline', '❌ 连接失败：' + e.message);
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

// ==================== 状态栏 ====================
function showStatus(state, msg) {
  const bar = document.getElementById('statusBar');
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  bar.className = 'status-bar ' + state;
  dot.className = 'status-dot ' + state;
  text.textContent = msg;
}

// ==================== Toast ====================
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

// ==================== 数据操作 ====================
function getBookingKey(year, month, day, slot) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}_${slot}`;
}

function saveToDb(key, data) {
  if (!db || !dbReady) { showToast('⚠️ 数据库未连接，请稍后再试', 'error'); return; }
  firebase.database().ref('bookings/' + key).set(data, function(err) {
    if (err) showToast('❌ 保存失败：' + err.message, 'error');
  });
}

function deleteFromDb(key) {
  if (!db || !dbReady) { showToast('⚠️ 数据库未连接，请稍后再试', 'error'); return; }
  firebase.database().ref('bookings/' + key).remove(function(err) {
    if (err) showToast('❌ 删除失败：' + err.message, 'error');
  });
}

// ==================== 设置弹窗 ====================
function openSettings() {
  document.getElementById('setPassword').value = settingsCache.password || '';
  document.getElementById('setTitle').value = settingsCache.title || '';
  document.getElementById('setAmLabel').value = settingsCache.amLabel || '';
  document.getElementById('setPmLabel').value = settingsCache.pmLabel || '';
  document.getElementById('errSetPassword').classList.remove('show');
  document.getElementById('setPassword').classList.remove('error');
  document.getElementById('settingsOverlay').style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}

function saveSettings() {
  const password = document.getElementById('setPassword').value.trim();
  if (!password) {
    document.getElementById('setPassword').classList.add('error');
    document.getElementById('errSetPassword').textContent = '密码不能为空';
    document.getElementById('errSetPassword').classList.add('show');
    return;
  }

  settingsCache.password = password;
  settingsCache.title = document.getElementById('setTitle').value.trim() || settingsCache.title;
  settingsCache.amLabel = document.getElementById('setAmLabel').value.trim() || settingsCache.amLabel;
  settingsCache.pmLabel = document.getElementById('setPmLabel').value.trim() || settingsCache.pmLabel;

  if (!db || !dbReady) { showToast('⚠️ 数据库未连接', 'error'); return; }

  firebase.database().ref('settings').set(settingsCache, function(err) {
    if (err) {
      showToast('❌ 保存失败：' + err.message, 'error');
    } else {
      applySettings();
      closeSettings();
      renderCalendar();
      showToast('✅ 设置已保存！', 'success');
    }
  });
}

// ==================== 日历 ====================
function initDate() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${currentYear}年 ${currentMonth}月`;
  const grid = document.getElementById('calendarGrid');
  const bookings = bookingsCache;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const firstDay = new Date(currentYear, currentMonth - 1, 1);
  const lastDay = new Date(currentYear, currentMonth, 0);
  const daysInMonth = lastDay.getDate();
  const startDayOfWeek = firstDay.getDay();

  let html = '';
  const prevLastDay = new Date(currentYear, currentMonth - 1, 0).getDate();
  for (let i = startDayOfWeek - 1; i >= 0; i--) {
    const d = prevLastDay - i;
    const m = currentMonth === 1 ? 12 : currentMonth - 1;
    const y = currentMonth === 1 ? currentYear - 1 : currentYear;
    html += buildDayCell(d, `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, true, false, bookings);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += buildDayCell(d, dateStr, false, dateStr === todayStr, bookings);
  }
  const totalCells = startDayOfWeek + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  const nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
  const nextYear = currentMonth === 12 ? currentYear + 1 : currentYear;
  for (let d = 1; d <= remaining; d++) {
    html += buildDayCell(d, `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`, true, false, bookings);
  }

  grid.innerHTML = html;
  updateStats(bookings);
}

function buildDayCell(dayNum, dateStr, isOtherMonth, isToday, bookings) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const keyAM = getBookingKey(y, m, d, 'am');
  const keyPM = getBookingKey(y, m, d, 'pm');
  const bAM = bookings[keyAM];
  const bPM = bookings[keyPM];

  let cellClass = 'day-cell';
  if (isOtherMonth) cellClass += ' other-month';
  if (isToday) cellClass += ' today';
  const oc = isOtherMonth ? ' outside-month' : '';

  return `
    <div class="${cellClass}">
      <span class="date-num">${dayNum}</span>
      ${bAM ? `
        <div class="slot morning booked${oc}" onclick="viewDetail('${keyAM}')">
          <span class="slot-label">上午</span>
          <span class="slot-info"><strong>${escHtml(bAM.companyName)}</strong></span>
          <span class="badge-people">${bAM.peopleCount}人</span>
          <button class="btn-delete" onclick="event.stopPropagation();deleteBooking('${keyAM}')" title="取消">✕</button>
        </div>` : `
        <div class="slot morning available${oc}" onclick="openBooking('${dateStr}','am')">
          <span class="slot-label">上午</span><span class="slot-info">点击预约</span>
        </div>`}
      ${bPM ? `
        <div class="slot afternoon booked${oc}" onclick="viewDetail('${keyPM}')">
          <span class="slot-label">下午</span>
          <span class="slot-info"><strong>${escHtml(bPM.companyName)}</strong></span>
          <span class="badge-people">${bPM.peopleCount}人</span>
          <button class="btn-delete" onclick="event.stopPropagation();deleteBooking('${keyPM}')" title="取消">✕</button>
        </div>` : `
        <div class="slot afternoon available${oc}" onclick="openBooking('${dateStr}','pm')">
          <span class="slot-label">下午</span><span class="slot-info">点击预约</span>
        </div>`}
    </div>`;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updateStats(bookings) {
  const prefix = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
  let count = 0;
  for (const key of Object.keys(bookings)) { if (key.startsWith(prefix)) count++; }
  document.getElementById('stats').innerHTML = `本月预约：<strong>${count}</strong> 场`;
}

// ==================== 导航 ====================
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  renderCalendar();
}
function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  renderCalendar();
}

// ==================== 预约弹窗 ====================
function openBooking(dateStr, slot) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const key = getBookingKey(y, m, d, slot);
  if (bookingsCache[key]) { viewDetail(key); return; }

  document.getElementById('modalTitle').textContent = '📝 预约会议室';
  document.getElementById('modalDateText').textContent = `${y}年${m}月${d}日`;
  const tag = document.getElementById('modalSlotTag');
  tag.textContent = slot === 'am' ? settingsCache.amLabel : settingsCache.pmLabel;
  tag.className = 'tag ' + (slot === 'am' ? 'morning' : 'afternoon');
  document.getElementById('companyName').value = '';
  document.getElementById('peopleCount').value = '';
  document.getElementById('supportStaff').value = '';
  document.getElementById('speaker').value = '';
  document.getElementById('reception').value = '';
  document.getElementById('reportReader').value = '';
  document.getElementById('editKey').value = key;
  clearErrors();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(function() { document.getElementById('companyName').focus(); }, 150);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  clearErrors();
  resetSaveBtn();
}

function resetSaveBtn() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✅ 确认预约';
  btn.className = 'btn btn-primary';
  btn.disabled = false;
}

function saveBooking() {
  const key = document.getElementById('editKey').value;
  const companyName = document.getElementById('companyName').value.trim();
  const peopleCountStr = document.getElementById('peopleCount').value.trim();
  const supportStaff = document.getElementById('supportStaff').value.trim();
  const speaker = document.getElementById('speaker').value.trim();
  const reception = document.getElementById('reception').value.trim();
  const reportReader = document.getElementById('reportReader').value.trim();

  let valid = true;
  clearErrors();
  if (!companyName) { showError('companyName', 'errCompany', '请输入公司名称'); valid = false; }
  if (!peopleCountStr || isNaN(peopleCountStr) || parseInt(peopleCountStr) < 1 || parseInt(peopleCountStr) > 500) {
    showError('peopleCount', 'errPeople', '请输入预计人数（1-500人）'); valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ 保存中…';
  btn.className = 'btn btn-saving';
  btn.disabled = true;

  saveToDb(key, {
    companyName: companyName,
    peopleCount: parseInt(peopleCountStr),
    supportStaff: supportStaff,
    speaker: speaker,
    reception: reception,
    reportReader: reportReader,
    bookedAt: new Date().toISOString()
  });
  closeModal();
  showToast('✅ 预约成功！', 'success');
}

function showError(inputId, errId, msg) {
  document.getElementById(inputId).classList.add('error');
  const err = document.getElementById(errId);
  err.textContent = msg;
  err.classList.add('show');
}

function clearErrors() {
  document.querySelectorAll('.form-group input.error').forEach(function(el) { el.classList.remove('error'); });
  document.querySelectorAll('.error-msg.show').forEach(function(el) { el.classList.remove('show'); });
}

// ==================== 详情弹窗 ====================
function viewDetail(key) {
  const booking = bookingsCache[key];
  if (!booking) return;
  detailKey = key;
  const parts = key.split('_')[0].split('-').map(Number);
  const slot = key.split('_')[1];

  document.getElementById('detailDateText').textContent = `${parts[0]}年${parts[1]}月${parts[2]}日`;
  const tag = document.getElementById('detailSlotTag');
  tag.textContent = slot === 'am' ? settingsCache.amLabel : settingsCache.pmLabel;
  tag.className = 'tag ' + (slot === 'am' ? 'morning' : 'afternoon');

  document.getElementById('detailCompany').textContent = booking.companyName;
  document.getElementById('detailCompany').classList.remove('empty');
  document.getElementById('detailPeople').textContent = booking.peopleCount + ' 人';
  document.getElementById('detailPeople').classList.remove('empty');

  [{id:'detailSupport',v:booking.supportStaff},{id:'detailSpeaker',v:booking.speaker},{id:'detailReception',v:booking.reception},{id:'detailReport',v:booking.reportReader}].forEach(function(f) {
    var el = document.getElementById(f.id);
    if (f.v) { el.textContent = f.v; el.classList.remove('empty'); }
    else { el.textContent = '（未填写）'; el.classList.add('empty'); }
  });

  document.getElementById('detailOverlay').style.display = 'flex';
}

function closeDetail() { document.getElementById('detailOverlay').style.display = 'none'; detailKey = null; }

function editFromDetail() {
  if (!detailKey) return;
  var b = bookingsCache[detailKey];
  if (!b) return;
  var parts = detailKey.split('_')[0].split('-').map(Number);
  var slot = detailKey.split('_')[1];
  document.getElementById('detailOverlay').style.display = 'none';

  document.getElementById('modalTitle').textContent = '✏️ 修改预约';
  document.getElementById('modalDateText').textContent = `${parts[0]}年${parts[1]}月${parts[2]}日`;
  var tag = document.getElementById('modalSlotTag');
  tag.textContent = slot === 'am' ? settingsCache.amLabel : settingsCache.pmLabel;
  tag.className = 'tag ' + (slot === 'am' ? 'morning' : 'afternoon');

  document.getElementById('companyName').value = b.companyName;
  document.getElementById('peopleCount').value = b.peopleCount;
  document.getElementById('supportStaff').value = b.supportStaff || '';
  document.getElementById('speaker').value = b.speaker || '';
  document.getElementById('reception').value = b.reception || '';
  document.getElementById('reportReader').value = b.reportReader || '';
  document.getElementById('editKey').value = detailKey;

  clearErrors(); resetSaveBtn();
  document.getElementById('modalOverlay').style.display = 'flex';
  detailKey = null;
}

function deleteFromDetail() {
  if (!detailKey) return;
  var b = bookingsCache[detailKey];
  if (!b) return;
  if (!confirm('确定要取消「' + b.companyName + '」的预约吗？\n\n此操作不可恢复。')) return;
  deleteFromDb(detailKey);
  document.getElementById('detailOverlay').style.display = 'none';
  detailKey = null;
  showToast('🗑 预约已取消', 'info');
}

function deleteBooking(key) {
  var b = bookingsCache[key];
  if (!b) return;
  if (!confirm('确定要取消「' + b.companyName + '」的预约吗？\n\n此操作不可恢复。')) return;
  deleteFromDb(key);
  showToast('🗑 预约已取消', 'info');
}

// ==================== 清空本月 ====================
function clearAll() {
  var monthStr = `${currentYear}年${currentMonth}月`;
  if (!confirm('⚠️ 确定要清空 ' + monthStr + ' 的所有预约记录吗？\n\n此操作不可恢复！')) return;
  if (!db || !dbReady) { showToast('⚠️ 数据库未连接', 'error'); return; }
  var prefix = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
  var updates = {};
  for (var key in bookingsCache) { if (key.startsWith(prefix)) updates[key] = null; }
  if (Object.keys(updates).length === 0) { showToast('本月暂无预约记录', 'info'); return; }
  firebase.database().ref('bookings').update(updates, function(err) {
    if (err) showToast('❌ 清空失败：' + err.message, 'error');
    else showToast('✅ 已清空本月所有预约', 'success');
  });
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').style.display === 'flex') closeModal();
    else if (document.getElementById('detailOverlay').style.display === 'flex') closeDetail();
    else if (document.getElementById('settingsOverlay').style.display === 'flex') closeSettings();
  }
  if (document.getElementById('lockOverlay').classList.contains('hidden') &&
      (document.getElementById('modalOverlay').style.display || '') === '' &&
      (document.getElementById('modalOverlay').style.display === '' || document.getElementById('modalOverlay').style.display === 'none') &&
      (document.getElementById('detailOverlay').style.display === '' || document.getElementById('detailOverlay').style.display === 'none')) {
    if (e.key === 'ArrowLeft') changeMonth(-1);
    if (e.key === 'ArrowRight') changeMonth(1);
  }
});

// 点击遮罩关闭
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('detailOverlay').addEventListener('click', function(e) { if (e.target === this) closeDetail(); });
document.getElementById('settingsOverlay').addEventListener('click', function(e) { if (e.target === this) closeSettings(); });

// ==================== 启动 ====================
initDate();
renderCalendar();

// 检查是否已登录
if (checkLogin()) {
  initFirebase();
}
// 否则显示密码锁屏，等待输入密码后才会初始化 Firebase
</script>
