<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全景机构部 - 5楼会议室预约系统</title>

<!-- ==================== 🔥 Firebase SDK ==================== -->
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-database-compat.js"></script>

<style>
  :root {
    --primary: #1a6dcc;
    --primary-light: #e8f2fb;
    --primary-dark: #1456a3;
    --morning: #f0a04b;
    --morning-light: #fef7f0;
    --morning-border: #f5c98e;
    --afternoon: #5b9bd5;
    --afternoon-light: #f0f6fc;
    --afternoon-border: #9dc3e6;
    --success: #27ae60;
    --danger: #e74c3c;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --border: #e0e5ec;
    --bg: #f5f7fa;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  /* ========== 头部 ========== */
  .header {
    background: linear-gradient(135deg, #1a3a5c 0%, #1a6dcc 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  /* ========== 连接状态 ========== */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 12px;
    padding: 6px;
    border-radius: 20px;
    transition: all 0.3s;
  }
  .status-bar.online { background: #e8f8e8; color: #27ae60; }
  .status-bar.offline { background: #fff5f5; color: #e74c3c; }
  .status-bar.connecting { background: #fffdf5; color: #f0a04b; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.online { background: #27ae60; animation: pulse 2s infinite; }
  .status-dot.offline { background: #e74c3c; }
  .status-dot.connecting { background: #f0a04b; animation: pulse 0.6s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ========== 工具栏 ========== */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .month-nav button {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--white);
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .month-nav button:hover {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
  }
  .month-label {
    font-size: 17px; font-weight: 700;
    min-width: 130px; text-align: center;
    color: var(--text);
  }
  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-today {
    padding: 7px 16px;
    border: 1px solid var(--primary);
    border-radius: var(--radius-sm);
    background: var(--white);
    color: var(--primary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-today:hover { background: var(--primary); color: #fff; }
  .btn-clear {
    padding: 7px 16px;
    border: 1px solid var(--danger);
    border-radius: var(--radius-sm);
    background: var(--white);
    color: var(--danger);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-clear:hover { background: var(--danger); color: #fff; }
  .stats {
    font-size: 13px;
    color: var(--text-light);
    background: var(--bg);
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .stats strong { color: var(--primary); }

  /* ========== 图例 ========== */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text-light);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .legend-dot.morning { background: var(--morning-light); border: 1.5px solid var(--morning-border); }
  .legend-dot.afternoon { background: var(--afternoon-light); border: 1.5px solid var(--afternoon-border); }
  .legend-dot.booked { background: #e8f8e8; border: 1.5px solid #a3d9a5; }

  /* ========== 加载遮罩 ========== */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.85);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .loading-overlay.hidden { display: none; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-light); }

  /* ========== 日历 ========== */
  .calendar-wrap {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f0f4f8;
    border-bottom: 1px solid var(--border);
  }
  .weekdays div {
    padding: 12px 4px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
  }
  .weekdays div:first-child,
  .weekdays div:last-child { color: var(--danger); }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
  }
  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: background 0.15s;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month { background: #fafbfc; }
  .day-cell.other-month .date-num { color: #c0c7cf; }
  .day-cell.today { background: #fffdf5; }
  .day-cell.today .date-num {
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .date-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1px;
  }
  .day-cell:nth-child(7n) .date-num,
  .day-cell:nth-child(7n-6) .date-num { color: var(--danger); }

  /* 时段按钮 */
  .slot {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 6px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    cursor: pointer;
    border: 1.5px dashed transparent;
    transition: all 0.2s;
    position: relative;
    min-height: 24px;
  }
  .slot.outside-month { opacity: 0.4; pointer-events: none; }
  .slot.available:hover { transform: translateY(-1px); }
  .slot-label {
    font-weight: 700;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .slot.morning { background: var(--morning-light); border-color: var(--morning-border); }
  .slot.morning .slot-label { background: var(--morning); color: #fff; }
  .slot.afternoon { background: var(--afternoon-light); border-color: var(--afternoon-border); }
  .slot.afternoon .slot-label { background: var(--afternoon); color: #fff; }
  .slot.booked {
    background: #e8f8e8;
    border-color: #a3d9a5;
    cursor: pointer;
  }
  .slot.booked:hover { background: #d4f2d4; }
  .slot-info {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    color: var(--text);
  }
  .slot-info strong { font-size: 11px; }
  .slot .badge-people {
    font-size: 10px;
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 10px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .slot .btn-delete {
    display: none;
    width: 16px; height: 16px;
    border: none;
    background: var(--danger);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 10px;
    line-height: 1;
    flex-shrink: 0;
    text-align: center;
  }
  .slot.booked:hover .btn-delete { display: inline-flex; align-items: center; justify-content: center; }
  .slot.booked:hover .badge-people { display: none; }
  .slot.available .slot-info { color: #aab5c0; font-size: 10px; }

  /* ========== 弹窗 ========== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s;
  }
  .modal h3 {
    font-size: 18px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .modal .modal-date {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal .modal-date .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }
  .modal .modal-date .tag.morning { background: var(--morning); }
  .modal .modal-date .tag.afternoon { background: var(--afternoon); }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .form-group label .required { color: var(--danger); margin-left: 2px; }
  .form-group label .optional {
    color: var(--text-light);
    font-weight: 400;
    font-size: 11px;
    margin-left: 4px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
    background: var(--bg);
    color: var(--text);
  }
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,109,204,0.1);
  }
  .form-group input.error { border-color: var(--danger); background: #fff5f5; }
  .form-group .error-msg {
    font-size: 11px;
    color: var(--danger);
    margin-top: 2px;
    display: none;
  }
  .form-group .error-msg.show { display: block; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-divider {
    font-size: 12px;
    color: var(--text-light);
    margin: 14px 0 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-weight: 600;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }
  .btn {
    padding: 9px 22px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #e8ecf0; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-saving {
    background: #95a5a6;
    color: #fff;
    cursor: not-allowed;
    opacity: 0.7;
  }

  /* ========== 详情弹窗 ========== */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin: 12px 0;
  }
  .detail-item { font-size: 13px; }
  .detail-item .detail-label { color: var(--text-light); font-size: 11px; }
  .detail-item .detail-value { color: var(--text); font-weight: 500; }
  .detail-item .detail-value.empty { color: #ccc; font-style: italic; }
  .detail-item.full-width { grid-column: 1 / -1; }

  /* ========== Toast ========== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.3s;
    pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .toast.success { background: #27ae60; color: #fff; }
  .toast.error { background: #e74c3c; color: #fff; }
  .toast.info { background: #1a6dcc; color: #fff; }

  /* ========== 响应式 ========== */
  @media (max-width: 768px) {
    body { padding: 8px; }
    .header { padding: 14px 16px; }
    .header h1 { font-size: 18px; }
    .toolbar { padding: 10px 12px; gap: 8px; }
    .month-label { font-size: 15px; min-width: 110px; }
    .day-cell { min-height: 68px; padding: 4px; }
    .slot { padding: 3px 4px; font-size: 10px; }
    .slot-label { font-size: 9px; padding: 1px 3px; }
    .slot-info { font-size: 10px; }
    .date-num { font-size: 11px; }
    .modal { width: 95%; padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .calendar-grid { grid-auto-rows: auto; }
  }

  @media (max-width: 400px) {
    .day-cell { min-height: 56px; padding: 2px; gap: 2px; }
    .slot { padding: 2px 3px; }
    .slot-info { display: none; }
    .slot.booked .slot-info { display: block; }
    .weekdays div { font-size: 10px; padding: 8px 2px; }
  }

  @media print {
    body { background: #fff; }
    .toolbar, .btn-delete, .legend, .status-bar { display: none; }
    .calendar-wrap { box-shadow: none; border: 1px solid #000; }
    .slot.booked { background: #fff; border: 1px solid #000; }
    .modal-overlay { display: none !important; }
  }
</style>
</head>

<!-- ========== 头部 ========== -->
<div class="header">
  <h1>🏢 全景机构部 · 5楼会议室预约</h1>
  <div class="subtitle" id="headerSub">多人共享 · 实时同步</div>
</div>

<!-- ========== 连接状态 ========== -->
<div class="status-bar connecting" id="statusBar">
  <span class="status-dot connecting" id="statusDot"></span>
  <span id="statusText">正在连接数据库…</span>
</div>

<!-- ========== 加载遮罩 ========== -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载预约数据…</div>
</div>

<!-- ========== 工具栏 ========== -->
<div class="toolbar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)" title="上一月">◀</button>
    <span class="month-label" id="monthLabel">2026年 7月</span>
    <button onclick="changeMonth(1)" title="下一月">▶</button>
  </div>
  <div class="toolbar-right">
    <span class="stats" id="stats">本月预约：<strong>0</strong> 场</span>
    <button class="btn-today" onclick="goToday()">📅 回到今天</button>
    <button class="btn-clear" onclick="clearAll()">🗑 清空本月</button>
  </div>
</div>

<!-- ========== 图例 ========== -->
<div class="legend">
  <div class="legend-item"><span class="legend-dot morning"></span> 上午（9:00-12:00）</div>
  <div class="legend-item"><span class="legend-dot afternoon"></span> 下午（14:00-17:00）</div>
  <div class="legend-item"><span class="legend-dot booked"></span> 已预约</div>
</div>

<!-- ========== 日历 ========== -->
<div class="calendar-wrap">
  <div class="weekdays">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<!-- ========== 预约弹窗 ========== -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal" id="bookingModal">
    <h3 id="modalTitle">📝 预约会议室</h3>
    <div class="modal-date">
      <span id="modalDateText"></span>
      <span class="tag" id="modalSlotTag"></span>
    </div>
    <div class="form-group">
      <label>公司名称 <span class="required">*</span></label>
      <input type="text" id="companyName" placeholder="请输入公司名称" maxlength="50">
      <div class="error-msg" id="errCompany">请输入公司名称</div>
    </div>
    <div class="form-group">
      <label>预计人数 <span class="required">*</span></label>
      <input type="number" id="peopleCount" placeholder="请输入预计人数" min="1" max="500">
      <div class="error-msg" id="errPeople">请输入预计人数（1-500人）</div>
    </div>
    <div class="form-divider">📋 以下为选填项目</div>
    <div class="form-row">
      <div class="form-group">
        <label>会销保障人员 <span class="optional">选填</span></label>
        <input type="text" id="supportStaff" placeholder="保障人员姓名" maxlength="20">
      </div>
      <div class="form-group">
        <label>主讲 <span class="optional">选填</span></label>
        <input type="text" id="speaker" placeholder="主讲人姓名" maxlength="20">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>接待 <span class="optional">选填</span></label>
        <input type="text" id="reception" placeholder="接待人员姓名" maxlength="20">
      </div>
      <div class="form-group">
        <label>报告解读 <span class="optional">选填</span></label>
        <input type="text" id="reportReader" placeholder="报告解读人员" maxlength="20">
      </div>
    </div>
    <input type="hidden" id="editKey">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveBooking()">✅ 确认预约</button>
    </div>
  </div>
</div>

<!-- ========== 查看详情弹窗 ========== -->
<div class="modal-overlay" id="detailOverlay" style="display:none;">
  <div class="modal" id="detailModal">
    <h3>📋 预约详情</h3>
    <div class="modal-date">
      <span id="detailDateText"></span>
      <span class="tag" id="detailSlotTag"></span>
    </div>
    <div class="detail-grid">
      <div class="detail-item full-width">
        <div class="detail-label">公司名称</div>
        <div class="detail-value" id="detailCompany"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">预计人数</div>
        <div class="detail-value" id="detailPeople"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">会销保障人员</div>
        <div class="detail-value" id="detailSupport"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">主讲</div>
        <div class="detail-value" id="detailSpeaker"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">接待</div>
        <div class="detail-value" id="detailReception"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">报告解读</div>
        <div class="detail-value" id="detailReport"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="detailDeleteBtn" onclick="deleteFromDetail()">🗑 取消预约</button>
      <button class="btn btn-primary" id="detailEditBtn" onclick="editFromDetail()">✏️ 修改预约</button>
      <button class="btn btn-secondary" onclick="closeDetail()">关闭</button>
    </div>
  </div>
</div>

<!-- ========== 脚本 ========== -->
<script>
// ==================== 🔥 Firebase 初始化 ====================
let db = null;
let dbReady = false;
let bookingsCache = {}; // 本地缓存，渲染用

function initFirebase() {
  try {
    // 检查是否填写了配置
    if (FIREBASE_CONFIG.apiKey.includes('PLACEHOLDER')) {
      showStatus('offline', '❌ 未配置 Firebase，请先修改配置文件');
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('headerSub').textContent = '⚠️ 等待配置 Firebase';
      return;
    }

    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();

    // 监听连接状态
    firebase.database().ref('.info/connected').on('value', function(snap) {
      if (snap.val() === true) {
        dbReady = true;
        showStatus('online', '✅ 已连接 · 多人实时同步中');
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('headerSub').textContent = '多人共享 · 实时同步';
      } else {
        dbReady = false;
        showStatus('offline', '⚠️ 连接断开，正在重连…');
      }
    });

    // 实时监听预约数据
    firebase.database().ref('bookings').on('value', function(snapshot) {
      bookingsCache = snapshot.val() || {};
      document.getElementById('loadingOverlay').classList.add('hidden');
      renderCalendar();
    }, function(err) {
      showToast('⚠️ 数据读取失败，请检查 Firebase 数据库权限', 'error');
      document.getElementById('loadingOverlay').classList.add('hidden');
      showStatus('offline', '❌ 数据库连接失败');
    });

  } catch (e) {
    showStatus('offline', '❌ Firebase 初始化失败：' + e.message);
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

// ==================== 状态栏 ====================
function showStatus(state, msg) {
  const bar = document.getElementById('statusBar');
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  bar.className = 'status-bar ' + state;
  dot.className = 'status-dot ' + state;
  text.textContent = msg;
}

// ==================== Toast 提示 ====================
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

// ==================== 数据操作 ====================
function getBookingKey(year, month, day, slot) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}_${slot}`;
}

function saveToDb(key, data) {
  if (!db || !dbReady) {
    showToast('⚠️ 数据库未连接，请稍后再试', 'error');
    return;
  }
  firebase.database().ref('bookings/' + key).set(data, function(err) {
    if (err) {
      showToast('❌ 保存失败：' + err.message, 'error');
    }
    // 成功时实时监听会自动更新页面
  });
}

function deleteFromDb(key) {
  if (!db || !dbReady) {
    showToast('⚠️ 数据库未连接，请稍后再试', 'error');
    return;
  }
  firebase.database().ref('bookings/' + key).remove(function(err) {
    if (err) {
      showToast('❌ 删除失败：' + err.message, 'error');
    }
  });
}

// ==================== 状态 ====================
let currentYear, currentMonth;
let detailKey = null;

function initDate() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
}

// ==================== 渲染日历 ====================
function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${currentYear}年 ${currentMonth}月`;

  const grid = document.getElementById('calendarGrid');
  const bookings = bookingsCache;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const firstDay = new Date(currentYear, currentMonth - 1, 1);
  const lastDay = new Date(currentYear, currentMonth, 0);
  const daysInMonth = lastDay.getDate();
  const startDayOfWeek = firstDay.getDay();

  let html = '';

  // 上月填充
  const prevLastDay = new Date(currentYear, currentMonth - 1, 0).getDate();
  for (let i = startDayOfWeek - 1; i >= 0; i--) {
    const d = prevLastDay - i;
    const m = currentMonth === 1 ? 12 : currentMonth - 1;
    const y = currentMonth === 1 ? currentYear - 1 : currentYear;
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += buildDayCell(d, dateStr, true, false, bookings);
  }

  // 当月
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    html += buildDayCell(d, dateStr, false, isToday, bookings);
  }

  // 下月填充
  const totalCells = startDayOfWeek + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  const nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
  const nextYear = currentMonth === 12 ? currentYear + 1 : currentYear;
  for (let d = 1; d <= remaining; d++) {
    const dateStr = `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += buildDayCell(d, dateStr, true, false, bookings);
  }

  grid.innerHTML = html;
  updateStats(bookings);
}

function buildDayCell(dayNum, dateStr, isOtherMonth, isToday, bookings) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const keyAM = getBookingKey(y, m, d, 'am');
  const keyPM = getBookingKey(y, m, d, 'pm');
  const bookingAM = bookings[keyAM];
  const bookingPM = bookings[keyPM];

  let cellClass = 'day-cell';
  if (isOtherMonth) cellClass += ' other-month';
  if (isToday) cellClass += ' today';

  const outsideClass = isOtherMonth ? ' outside-month' : '';

  // 上午
  let amHtml = '';
  if (bookingAM) {
    amHtml = `
      <div class="slot morning booked${outsideClass}" onclick="viewDetail('${keyAM}')">
        <span class="slot-label">上午</span>
        <span class="slot-info"><strong>${escHtml(bookingAM.companyName)}</strong></span>
        <span class="badge-people">${bookingAM.peopleCount}人</span>
        <button class="btn-delete" onclick="event.stopPropagation();deleteBooking('${keyAM}')" title="取消预约">✕</button>
      </div>`;
  } else {
    amHtml = `
      <div class="slot morning available${outsideClass}" onclick="openBooking('${dateStr}','am')">
        <span class="slot-label">上午</span>
        <span class="slot-info">点击预约</span>
      </div>`;
  }

  // 下午
  let pmHtml = '';
  if (bookingPM) {
    pmHtml = `
      <div class="slot afternoon booked${outsideClass}" onclick="viewDetail('${keyPM}')">
        <span class="slot-label">下午</span>
        <span class="slot-info"><strong>${escHtml(bookingPM.companyName)}</strong></span>
        <span class="badge-people">${bookingPM.peopleCount}人</span>
        <button class="btn-delete" onclick="event.stopPropagation();deleteBooking('${keyPM}')" title="取消预约">✕</button>
      </div>`;
  } else {
    pmHtml = `
      <div class="slot afternoon available${outsideClass}" onclick="openBooking('${dateStr}','pm')">
        <span class="slot-label">下午</span>
        <span class="slot-info">点击预约</span>
      </div>`;
  }

  return `
    <div class="${cellClass}">
      <span class="date-num">${dayNum}</span>
      ${amHtml}
      ${pmHtml}
    </div>`;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updateStats(bookings) {
  const prefix = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
  let count = 0;
  for (const key of Object.keys(bookings)) {
    if (key.startsWith(prefix)) count++;
  }
  document.getElementById('stats').innerHTML = `本月预约：<strong>${count}</strong> 场`;
}

// ==================== 导航 ====================
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  renderCalendar();
}

function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  renderCalendar();
}

// ==================== 预约弹窗 ====================
function openBooking(dateStr, slot) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const key = getBookingKey(y, m, d, slot);

  if (bookingsCache[key]) {
    viewDetail(key);
    return;
  }

  document.getElementById('modalTitle').textContent = '📝 预约会议室';
  document.getElementById('modalDateText').textContent = `${y}年${m}月${d}日`;
  const tag = document.getElementById('modalSlotTag');
  tag.textContent = slot === 'am' ? '上午 9:00-12:00' : '下午 14:00-17:00';
  tag.className = 'tag ' + (slot === 'am' ? 'morning' : 'afternoon');

  document.getElementById('companyName').value = '';
  document.getElementById('peopleCount').value = '';
  document.getElementById('supportStaff').value = '';
  document.getElementById('speaker').value = '';
  document.getElementById('reception').value = '';
  document.getElementById('reportReader').value = '';
  document.getElementById('editKey').value = key;

  clearErrors();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(function() { document.getElementById('companyName').focus(); }, 150);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  clearErrors();
  resetSaveBtn();
}

function resetSaveBtn() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✅ 确认预约';
  btn.className = 'btn btn-primary';
  btn.disabled = false;
}

function saveBooking() {
  const key = document.getElementById('editKey').value;
  const companyName = document.getElementById('companyName').value.trim();
  const peopleCountStr = document.getElementById('peopleCount').value.trim();
  const supportStaff = document.getElementById('supportStaff').value.trim();
  const speaker = document.getElementById('speaker').value.trim();
  const reception = document.getElementById('reception').value.trim();
  const reportReader = document.getElementById('reportReader').value.trim();

  let valid = true;
  clearErrors();

  if (!companyName) {
    showError('companyName', 'errCompany', '请输入公司名称');
    valid = false;
  }
  if (!peopleCountStr || isNaN(peopleCountStr) || parseInt(peopleCountStr) < 1 || parseInt(peopleCountStr) > 500) {
    showError('peopleCount', 'errPeople', '请输入预计人数（1-500人）');
    valid = false;
  }

  if (!valid) return;

  // 显示保存中状态
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ 保存中…';
  btn.className = 'btn btn-saving';
  btn.disabled = true;

  const data = {
    companyName: companyName,
    peopleCount: parseInt(peopleCountStr),
    supportStaff: supportStaff,
    speaker: speaker,
    reception: reception,
    reportReader: reportReader,
    bookedAt: new Date().toISOString()
  };

  saveToDb(key, data);
  closeModal();
  showToast('✅ 预约成功！', 'success');
}

function showError(inputId, errId, msg) {
  document.getElementById(inputId).classList.add('error');
  const err = document.getElementById(errId);
  err.textContent = msg;
  err.classList.add('show');
}

function clearErrors() {
  document.querySelectorAll('.form-group input.error').forEach(function(el) { el.classList.remove('error'); });
  document.querySelectorAll('.error-msg.show').forEach(function(el) { el.classList.remove('show'); });
}

// ==================== 查看详情弹窗 ====================
function viewDetail(key) {
  const booking = bookingsCache[key];
  if (!booking) return;

  detailKey = key;
  const parts = key.split('_')[0].split('-').map(Number);
  const slot = key.split('_')[1];

  document.getElementById('detailDateText').textContent = `${parts[0]}年${parts[1]}月${parts[2]}日`;
  const tag = document.getElementById('detailSlotTag');
  tag.textContent = slot === 'am' ? '上午 9:00-12:00' : '下午 14:00-17:00';
  tag.className = 'tag ' + (slot === 'am' ? 'morning' : 'afternoon');

  document.getElementById('detailCompany').textContent = booking.companyName;
  document.getElementById('detailCompany').classList.remove('empty');
  document.getElementById('detailPeople').textContent = booking.peopleCount + ' 人';
  document.getElementById('detailPeople').classList.remove('empty');

  var fields = [
    { id: 'detailSupport', value: booking.supportStaff },
    { id: 'detailSpeaker', value: booking.speaker },
    { id: 'detailReception', value: booking.reception },
    { id: 'detailReport', value: booking.reportReader },
  ];
  fields.forEach(function(f) {
    var el = document.getElementById(f.id);
    if (f.value) {
      el.textContent = f.value;
      el.classList.remove('empty');
    } else {
      el.textContent = '（未填写）';
      el.classList.add('empty');
    }
  });

  document.getElementById('detailOverlay').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detailOverlay').style.display = 'none';
  detailKey = null;
}

function editFromDetail() {
  if (!detailKey) return;
  var booking = bookingsCache[detailKey];
  if (!booking) return;

  var parts = detailKey.split('_')[0].split('-').map(Number);
  var slot = detailKey.split('_')[1];

  document.getElementById('detailOverlay').style.display = 'none';

  document.getElementById('modalTitle').textContent = '✏️ 修改预约';
  document.getElementById('modalDateText').textContent = `${parts[0]}年${parts[1]}月${parts[2]}日`;
  var tag = document.getElementById('modalSlotTag');
  tag.textContent = slot === 'am' ? '上午 9:00-12:00' : '下午 14:00-17:00';
  tag.className = 'tag ' + (slot === 'am' ? 'morning' : 'afternoon');

  document.getElementById('companyName').value = booking.companyName;
  document.getElementById('peopleCount').value = booking.peopleCount;
  document.getElementById('supportStaff').value = booking.supportStaff || '';
  document.getElementById('speaker').value = booking.speaker || '';
  document.getElementById('reception').value = booking.reception || '';
  document.getElementById('reportReader').value = booking.reportReader || '';
  document.getElementById('editKey').value = detailKey;

  clearErrors();
  resetSaveBtn();
  document.getElementById('modalOverlay').style.display = 'flex';

  detailKey = null;
}

function deleteFromDetail() {
  if (!detailKey) return;
  var booking = bookingsCache[detailKey];
  if (!booking) return;

  if (!confirm('确定要取消「' + booking.companyName + '」的预约吗？\n\n此操作不可恢复。')) return;

  deleteFromDb(detailKey);
  document.getElementById('detailOverlay').style.display = 'none';
  detailKey = null;
  showToast('🗑 预约已取消', 'info');
}

// ==================== 删除预约 ====================
function deleteBooking(key) {
  var booking = bookingsCache[key];
  if (!booking) return;

  if (!confirm('确定要取消「' + booking.companyName + '」的预约吗？\n\n此操作不可恢复。')) return;

  deleteFromDb(key);
  showToast('🗑 预约已取消', 'info');
}

// ==================== 清空本月 ====================
function clearAll() {
  var monthStr = `${currentYear}年${currentMonth}月`;
  if (!confirm('⚠️ 确定要清空 ' + monthStr + ' 的所有预约记录吗？\n\n此操作不可恢复！')) return;

  if (!db || !dbReady) {
    showToast('⚠️ 数据库未连接', 'error');
    return;
  }

  var prefix = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
  var updates = {};
  for (var key in bookingsCache) {
    if (key.startsWith(prefix)) {
      updates[key] = null; // null = 删除
    }
  }

  if (Object.keys(updates).length === 0) {
    showToast('本月暂无预约记录', 'info');
    return;
  }

  firebase.database().ref('bookings').update(updates, function(err) {
    if (err) {
      showToast('❌ 清空失败：' + err.message, 'error');
    } else {
      showToast('✅ 已清空本月所有预约', 'success');
    }
  });
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').style.display === 'flex') {
      closeModal();
    } else if (document.getElementById('detailOverlay').style.display === 'flex') {
      closeDetail();
    }
  }
  if (!document.getElementById('modalOverlay').style.display ||
      document.getElementById('modalOverlay').style.display === 'none') {
    if (document.getElementById('detailOverlay').style.display !== 'flex') {
      if (e.key === 'ArrowLeft') changeMonth(-1);
      if (e.key === 'ArrowRight') changeMonth(1);
    }
  }
});

// 点击遮罩关闭
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// ==================== 启动 ====================
initDate();
// 先渲染一帧空日历
renderCalendar();
// 初始化 Firebase（成功后会通过实时监听自动重绘）
initFirebase();
</script>
</body>
</html>
